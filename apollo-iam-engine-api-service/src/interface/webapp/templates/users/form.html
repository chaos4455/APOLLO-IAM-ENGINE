{% extends "base.html" %}
{% block title %}Novo Usuário{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">👤 Novo Usuário</h1>
  <a href="/admin/users" class="btn btn-outline">← Voltar</a>
</div>
<div class="card" style="max-width:640px">
  <form method="post" action="/admin/users/new">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Usuário <span class="req">*</span></label>
        <input class="form-control" name="username" required placeholder="ex: joao.silva"/>
      </div>
      <div class="form-group">
        <label class="form-label">Senha <span class="req">*</span></label>
        <input class="form-control" type="password" name="password" required placeholder="••••••••"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" placeholder="email@exemplo.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Nome Completo</label>
        <input class="form-control" name="full_name" placeholder="João Silva"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Grupo</label>
        <select class="form-control" name="group_id">
          <option value="">— Sem grupo —</option>
          {% for g in groups %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de Usuário</label>
        <select class="form-control" name="type_id">
          <option value="">— Nenhum —</option>
          {% for t in types %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nível de Usuário</label>
      <select class="form-control" name="level_id">
        <option value="">— Nenhum —</option>
        {% for l in levels %}<option value="{{ l.id }}">{{ l.name }} (rank {{ l.rank }})</option>{% endfor %}
      </select>
    </div>
    <div class="flex gap-3 mt-2">
      <label class="form-check"><input type="checkbox" name="is_active" checked/> Ativo</label>
      <label class="form-check"><input type="checkbox" name="is_superuser"/> Superuser</label>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">✅ Criar Usuário</button>
      <a href="/admin/users" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
