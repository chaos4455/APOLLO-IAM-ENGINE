<header class="navbar">
  <div class="navbar-left">
    <button class="hamburger" id="sidebar-toggle" aria-label="Menu" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="navbar-title">{% block navbar_title %}Apollo IAM Engine{% endblock %}</span>
  </div>
  <div class="navbar-right">
    <div class="navbar-user">
      <div class="avatar">{{ request.session.user.username[0].upper() if request.session.user else 'A' }}</div>
      <span>{{ request.session.user.username if request.session.user else '' }}</span>
    </div>
  </div>
</header>
