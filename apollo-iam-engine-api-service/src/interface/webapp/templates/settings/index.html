{% extends "base.html" %}
{% block title %}Configurações{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">⚙️ Configurações</h1>
</div>
<div class="card" style="max-width:560px;width:100%">
  <form method="post" action="/admin/settings">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Expiração do Access Token (min)</label>
        <input class="form-control" type="number" name="access_token_expire_minutes"
               value="{{ settings.access_token_expire_minutes or 60 }}" min="1"/>
      </div>
      <div class="form-group">
        <label class="form-label">Expiração do Refresh Token (dias)</label>
        <input class="form-control" type="number" name="refresh_token_expire_days"
               value="{{ settings.refresh_token_expire_days or 7 }}" min="1"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Máx. Tentativas de Login</label>
        <input class="form-control" type="number" name="max_login_attempts"
               value="{{ settings.max_login_attempts or 5 }}" min="1"/>
      </div>
      <div class="form-group">
        <label class="form-label">Bloqueio (minutos)</label>
        <input class="form-control" type="number" name="lockout_minutes"
               value="{{ settings.lockout_minutes or 15 }}" min="1"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-check">
        <input type="checkbox" name="allow_registration"
               {% if settings.allow_registration %}checked{% endif %}/>
        Permitir auto-registro de usuários
      </label>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">💾 Salvar Configurações</button>
    </div>
  </form>
</div>
{% endblock %}
