<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — Apollo IAM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🔐</div>
      <h1>Apollo IAM Engine</h1>
      <p>O2 Data Solutions — Painel de Controle</p>
    </div>
    {% if error %}<div class="alert alert-error">⚠️ {{ error }}</div>{% endif %}
    <form method="post" action="/admin/login">
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input class="form-control" type="text" name="username" placeholder="admin" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button class="btn btn-primary w-full mt-3" style="justify-content:center" type="submit">
        🚀 Entrar
      </button>
    </form>
    <div style="text-align:center;margin-top:18px;font-size:.72rem;color:var(--text-muted)">
      Apollo IAM Engine v1.0.0
    </div>
  </div>
</div>
</body>
</html>
