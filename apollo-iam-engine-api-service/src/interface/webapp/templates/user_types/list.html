{% extends "base.html" %}
{% block title %}Tipos de Usuário{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">🏷️ Tipos de Usuário</h1>
  <button class="btn btn-primary" onclick="document.getElementById('modal-new').classList.add('open')">＋ Novo Tipo</button>
</div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nome</th><th>Descrição</th><th></th></tr></thead>
      <tbody>
      {% for t in types %}
      <tr>
        <td><span class="badge badge-purple">🏷️ {{ t.name }}</span></td>
        <td class="text-muted">{{ t.description or '—' }}</td>
        <td>
          <form method="post" action="/admin/user-types/{{ t.id }}/delete" style="display:inline"
                onsubmit="return confirm('Excluir tipo {{ t.name }}?')">
            <button class="btn btn-danger btn-xs">🗑</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3"><div class="empty-state"><div class="empty-icon">🏷️</div><p>Nenhum tipo.</p></div></td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
<div class="modal-backdrop" id="modal-new">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🏷️ Novo Tipo de Usuário</span>
      <button class="modal-close" onclick="document.getElementById('modal-new').classList.remove('open')">✕</button>
    </div>
    <form method="post" action="/admin/user-types/new">
      <div class="form-group"><label class="form-label">Nome <span class="req">*</span></label>
        <input class="form-control" name="name" required placeholder="ex: Funcionário"/></div>
      <div class="form-group"><label class="form-label">Descrição</label>
        <input class="form-control" name="description" placeholder="Descrição"/></div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">✅ Criar</button>
        <button type="button" class="btn btn-outline" onclick="document.getElementById('modal-new').classList.remove('open')">Cancelar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
